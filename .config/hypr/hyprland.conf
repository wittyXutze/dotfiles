# ~/.config/hypr/hyprland.conf
# arch · Intel HD 530 · kitty · wofi

debug {
    disable_logs = false
}

################
# Monitor
################
# LG 32UN880 · 3840x2160 · 30Hz · Skalierung 1.25 (= 125%)
monitor = HDMI-A-1, 3840x2160@30, 0x0, 1.25
monitor = eDP-1, 1920x1080@60, 3840x0, 1

################
# Autostart
################
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /home/withold/.config/hypr/monitor-setup.sh
exec-once = swaybg -o HDMI-A-1 -i /home/withold/.config/hypr/wallpapers/artemis-earth.jpg -m fill
exec-once = hypridle
exec-once = mako
exec-once = hyprswitch init --show-title &
exec-once = nm-applet --indicator
exec-once = swayosd-server
exec-once = wlsunset -l 51.0 -L 13.8
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = ~/.config/waybar/launch.sh

################
# Eingabe
################
input {
    kb_layout = de
    kb_options = caps:none
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

################
# Allgemein
################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

################
# Dekoration
################
decoration {
    rounding = 8
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

################
# Animationen
################
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

################
# Layout
################
dwindle {
    preserve_split = true
}

################
# Diverses
################
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

################
# XDG Portal
################
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# Intel-spezifisch
env = LIBVA_DRIVER_NAME, i965
env = WLR_NO_HARDWARE_CURSORS, 0

################
# Keybindings
################
$mod = SUPER

bind = $mod, Return,       exec, kitty
bind = $mod, D,            exec, wofi --show drun
bind = $mod, Q,            killactive
bind = $mod, M,            exit
bind = $mod, F,            fullscreen
bind = $mod, V,            togglefloating
bind = $mod SHIFT, V,      exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Fokus
bind = $mod, H,            movefocus, l
bind = $mod, L,            movefocus, r
bind = $mod, F1,           exec, hyprlock
bind = $mod, K,            movefocus, u
bind = $mod, J,            movefocus, d

# Fenster verschieben
bind = $mod SHIFT, H,      movewindow, l
bind = $mod SHIFT, L,      movewindow, r
bind = $mod SHIFT, K,      movewindow, u
bind = $mod SHIFT, J,      movewindow, d

# Workspaces 1–9
bind = $mod, 1,            workspace, 1
bind = $mod, 2,            workspace, 2
bind = $mod, 3,            workspace, 3
bind = $mod, 4,            workspace, 4
bind = $mod, 5,            workspace, 5
bind = $mod, 6,            workspace, 6
bind = $mod, 7,            workspace, 7
bind = $mod, 8,            workspace, 8
bind = $mod, 9,            workspace, 9

# Fenster auf Workspace verschieben
bind = $mod SHIFT, 1,      movetoworkspace, 1
bind = $mod SHIFT, 2,      movetoworkspace, 2
bind = $mod SHIFT, 3,      movetoworkspace, 3
bind = $mod SHIFT, 4,      movetoworkspace, 4
bind = $mod SHIFT, 5,      movetoworkspace, 5
bind = $mod SHIFT, 6,      movetoworkspace, 6
bind = $mod SHIFT, 7,      movetoworkspace, 7
bind = $mod SHIFT, 8,      movetoworkspace, 8
bind = $mod SHIFT, 9,      movetoworkspace, 9

# Maus
bindm = $mod, mouse:272,   movewindow
bindm = $mod, mouse:273,   resizewindow

# Screenshot (braucht grim + slurp)
bind = $mod SHIFT, S,      exec, grim -g "$(slurp)" ~/Bilder/screenshot-$(date +%F_%T).png


# Workspace 7 Layout
windowrule = float, class:.*
windowrule = match:class cutecom, workspace 7 silent
windowrule = match:class cutecom, float on
windowrule = match:class cutecom, size 768 838
windowrule = match:class cutecom, move 10 42
windowrule = match:class beremiz, workspace 7 silent
windowrule = match:class beremiz, float on
windowrule = match:class beremiz, size 1536 1676
windowrule = match:class beremiz, move 1546 42
env = GDK_SCALE, 1
env = _JAVA_AWT_WM_NONREPARENTING, 1
bind = $mod CTRL, 1, exec, ~/.config/hypr/scripts/workspace1.sh
bind = $mod CTRL, 2, exec, ~/.config/hypr/scripts/workspace2.sh
bind = $mod CTRL, 3, exec, ~/.config/hypr/scripts/workspace3.sh
bind = $mod CTRL, 7, exec, ~/.config/hypr/scripts/workspace7.sh





# Qt Theming
env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1

# Media-Tasten
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioStop,  exec, playerctl stop

# Media-Tasten
bind = $mod, P,  exec, playerctl play-pause
bind = $mod, odiaeresis, exec, playerctl previous
bind = $mod, adiaeresis, exec, playerctl next

# Blaulichtfilter
bind = $mod, N, exec, pkill wlsunset || wlsunset -l 51.0 -L 13.8

# Lautstärke (swayosd)
bindl = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindl = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bind = $mod, F11, exec, swayosd-client --output-volume lower
bind = $mod, F12, exec, swayosd-client --output-volume raise
bind = $mod, C, exec, hyprpicker -a
env = XCURSOR_THEME, Adwaita
env = XCURSOR_SIZE, 24

# Window Switcher (hyprswitch)
bind = ALT, Tab, exec, hyprswitch gui --mod-key alt --key tab

# Screenshot mit Annotation (satty)
bind = $mod SHIFT, A, exec, grim -g "$(slurp)" - | satty --filename -
windowrule = match:class chromium, workspace 2 silent
windowrule = match:class chromium, float on
windowrule = match:class chromium, size 1536 1676
windowrule = match:class chromium, move 768 42

windowrule = match:class org.gnome.Nautilus, float on
bind = $mod SHIFT, D, exec, ~/.config/hypr/scripts/float-launch.sh
windowrule = match:class code, float on
bind = $mod SHIFT, left, swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up, swapwindow, u
bind = $mod SHIFT, down, swapwindow, d

# RustDesk
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = GTK_USE_PORTAL,1